<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="bounty-doctor logo">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="36" fill="#0d1117"/>

  <!-- Stethoscope-as-diagram: a magnifier lens on the chart -->
  <g transform="translate(36,40)">
    <!-- diagnostic bars -->
    <rect x="0"   y="60"  width="40" height="20" rx="3" fill="#da3633"/>
    <rect x="0"   y="92"  width="80" height="20" rx="3" fill="#dbab0a"/>
    <rect x="0"   y="124" width="120" height="20" rx="3" fill="#238636"/>
    <!-- magnifier on the bars -->
    <circle cx="138" cy="104" r="40" fill="none" stroke="url(#lg)" stroke-width="10"/>
    <line x1="170" y1="136" x2="200" y2="166" stroke="url(#lg)" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Terminal $ -->
  <text x="36" y="220" font-family="ui-monospace, monospace" font-size="40" font-weight="800" fill="#7ee787">$</text>
  <text x="68" y="220" font-family="ui-monospace, monospace" font-size="32" font-weight="800" fill="#c9d1d9">bd</text>
</svg>
